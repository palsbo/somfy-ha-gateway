#########################################################
#
# JSON - RTS ESPHome gateway weith ESP32 + CC1101
#
# Adjust the PIN allocation to your actual hardware
#
#########################################################
substitutions:
  my_name: somfy-cc1101-gw
  my_friendly_name: Somfy CC1101 Gateway
  my_board: esp32dev
  cc_cs: GPIO5
  cc_clk: GPIO18
  cc_mosi: GPIO23
  cc_miso: GPIO19
  cc_gdo0: GPIO26
  cc_gdo2: GPIO35
    
esphome:
  name: $my_name
  friendly_name: $my_friendly_name
  min_version: 2025.11.0
  name_add_mac_suffix: false
  platformio_options:
    lib_ldf_mode: deep+
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(my_somfy).rx_sensor = id(somfy_json_rx);

external_components:
  - source:
      type: local
      path: components

somfy_cc1101_v2:
  id: my_somfy
  transmitter: somfy_tx

esp32:
  board: $my_board
  framework:
    type: arduino

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

spi:
  clk_pin: $cc_clk
  mosi_pin: $cc_mosi
  miso_pin: $cc_miso

# ESPHomes native CC1101 komponent håndterer al CC1101-konfiguration
cc1101:
  cs_pin: $cc_cs
  frequency: 433.42MHz

# TX via RMT-periferien — on_transmit/on_complete styrer CC1101 TX/RX mode
remote_transmitter:
  id: somfy_tx
  pin: $cc_gdo0        # GDO0
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

# RX via ESPHomes remote_receiver — on_raw sender pulser til Somfy-decoder
remote_receiver:
  pin: $cc_gdo2        # GDO2
  dump: []
  filter: 100us
  idle: 40ms
  buffer_size: 8kb
  on_raw:
    - lambda: |-
        id(my_somfy).decode_raw_pulses(x);

# RX: modtagne Somfy-beskeder leveres her som JSON
# Eksempel: {"protocol":"somfy_rts","dir":"rx","address":"A1B2C3","command":"Up","rolling_code":1234}
text_sensor:
  - platform: template
    name: "Somfy JSON RX"
    id: somfy_json_rx

# TX: skriv JSON her for at sende til Somfy
# Normal:  {"address":"A1B2C3","command":"up","rolling_code":103,"repeat":2}
# PROG:    {"address":"A1B2C3","command":"prog","rolling_code":103,"repeat":25,"interval_ms":140}
text:
  - platform: template
    name: "Somfy JSON TX"
    id: somfy_json_tx
    mode: text
    optimistic: true
    set_action:
      - lambda: |-
          id(my_somfy).parse_and_send(x);